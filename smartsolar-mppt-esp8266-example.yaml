substitutions:
  name: victron-mppt
  external_components_source: github://KinDR007/VictronMPPT-ESPHOME@main

esphome:
  name: ${name}
  friendly_name: ${name}

esp8266:
  board: d1_mini

external_components:
  - source: ${external_components_source}
    refresh: 0s

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2

ota:
  platform: esphome

logger:
  baud_rate: 0
  esp8266_store_log_strings_in_flash: false

# If you use Home Assistant please remove this `mqtt` section and uncomment the `api` component!
# The native API has many advantages over MQTT: https://esphome.io/components/api.html#advantages-over-mqtt
mqtt:
  broker: !secret mqtt_host
  username: !secret mqtt_username
  password: !secret mqtt_password
  id: mqtt_client

# api:

uart:
  id: uart_0
  tx_pin: D8  # Not connected! The communication is read-only
  rx_pin: D7  # Connect this GPIO and GND to the MPPT charger
  baud_rate: 19200
  rx_buffer_size: 256

victron:
  uart_id: uart_0
  id: victron0
  throttle: 10s

sensor:
  - platform: victron
    victron_id: victron0
    max_power_yesterday:
      name: "max power yesterday"
    max_power_today:
      name: "max power today"
    yield_total:
      name: "yield total"
    yield_yesterday:
      name: "yield yesterday"
    yield_today:
      name: "yield today"
    panel_voltage:
      name: "panel voltage"
    panel_power:
      name: "panel power"
    battery_current:
      name: "panel current"
    battery_voltage:
      name: "battery voltage"
    day_number:
      name: "day number"
    charging_mode_id:
      name: "charging mode id"
    error_code:
      name: "error code"
    tracking_mode_id:
      name: "tracking mode id"
    load_current:
      name: "load current"

text_sensor:
  - platform: victron
    victron_id: victron0
    charging_mode:
      name: "charging mode"
    error:
      name: "error"
    tracking_mode:
      name: "tracking mode"
    firmware_version:
      name: "firmware version"
    device_type:
      name: "device type"
    serial_number:
      name: "serial number"

binary_sensor:
  - platform: victron
    victron_id: victron0
    load_state:
      name: "load state"
    relay_state:
      name: "relay state"
