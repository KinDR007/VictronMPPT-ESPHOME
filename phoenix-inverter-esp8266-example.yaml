substitutions:
  name: phoenix-inverter
  external_components_source: github://KinDR007/VictronMPPT-ESPHOME@main

esphome:
  name: ${name}
  friendly_name: ${name}

esp8266:
  board: d1_mini

external_components:
  - source: ${external_components_source}
    refresh: 0s

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2

ota:
  platform: esphome

logger:
  baud_rate: 0
  esp8266_store_log_strings_in_flash: false

# If you use Home Assistant please remove this `mqtt` section and uncomment the `api` component!
# The native API has many advantages over MQTT: https://esphome.io/components/api.html#advantages-over-mqtt
mqtt:
  broker: !secret mqtt_host
  username: !secret mqtt_username
  password: !secret mqtt_password
  id: mqtt_client

# api:

uart:
  id: uart_0
  tx_pin: D8  # Not connected! The communication is read-only
  rx_pin: D7  # Connect this GPIO and GND to the MPPT charger
  baud_rate: 19200
  rx_buffer_size: 256

victron:
  uart_id: uart_0
  id: victron0
  throttle: 10s

sensor:
  - platform: victron
    victron_id: victron0
    battery_voltage:
      name: "battery voltage"
    battery_current:
      name: "battery current"
    charging_mode_id:
      name: "charging mode id"
    device_mode_id:
      name: "device mode id"
    ac_out_voltage:
      name: "ac out voltage"
    ac_out_current:
      name: "ac out current"
    ac_out_apparent_power:
      name: "ac out apparent power"
    warning_code:
      name: "warning code"
    off_reason_bitmask:
      name: "off reason bitmask"

text_sensor:
  - platform: victron
    victron_id: victron0
    alarm_reason:
      name: "alarm reason"
    # TODO: "OR"
    charging_mode:
      name: "charging mode"
    firmware_version:
      name: "firmware version"
    device_type:
      name: "device type"
    serial_number:
      name: "serial number"
    device_mode:
      name: "device mode"
    warning:
      name: "warning"
    off_reason:
      name: "off reason"

binary_sensor:
  - platform: victron
    victron_id: victron0
    relay_state:
      name: "relay state"
