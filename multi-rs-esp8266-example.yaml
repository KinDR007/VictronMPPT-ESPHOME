substitutions:
  name: multi-rs
  external_components_source: github://KinDR007/VictronMPPT-ESPHOME@main

esphome:
  name: ${name}
  friendly_name: ${name}

esp8266:
  board: d1_mini

external_components:
  - source: ${external_components_source}
    refresh: 0s

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2

ota:
  platform: esphome

logger:
  baud_rate: 0
  esp8266_store_log_strings_in_flash: false

# If you use Home Assistant please remove this `mqtt` section and uncomment the `api` component!
# The native API has many advantages over MQTT: https://esphome.io/components/api.html#advantages-over-mqtt
mqtt:
  broker: !secret mqtt_host
  username: !secret mqtt_username
  password: !secret mqtt_password
  id: mqtt_client

# api:

uart:
  id: uart_0
  tx_pin: D8  # Not connected! The communication is read-only
  rx_pin: D7  # Connect this GPIO and GND to the MPPT charger
  baud_rate: 19200
  rx_buffer_size: 256

victron:
  uart_id: uart_0
  id: victron0
  throttle: 10s

sensor:
  - platform: victron
    victron_id: victron0
    charging_mode_id:
      name: "charging mode id"
    error_code:
      name: "error code"
    ac_out_current:
      name: "ac out current"
      id: ac_current
    ac_out_voltage:
      name: "ac out voltage"
      id: ac_voltage
    yield_total:
      name: "yield total"
    yield_today:
      name: "yield today"
    max_power_today:
      name: "max power today"
    yield_yesterday:
      name: "yield yesterday"
    max_power_yesterday:
      name: "max power yesterday"
    day_number:
      name: "day number"
    battery_current:
      name: "battery current"
    panel_power:
      name: "panel power"
    battery_voltage:
      name: "battery voltage"
    panel_voltage:
      name: "panel voltage"

  - platform: template
    name: "ac out power"
    # https://github.com/esphome/issues/issues/2793#issuecomment-988257209
    lambda: |-
       auto val = id(ac_voltage).state * id(ac_current).state;
       if (isnan(val))
          return {};
       return val;
    update_interval: 10s

text_sensor:
  - platform: victron
    victron_id: victron0
    device_type:
      name: "device type"
    serial_number:
      name: "serial number"
    firmware_version_24bit:
      name: "firmware version 24bit"
    charging_mode:
      name: "charging mode"
    error:
      name: "error"
    device_mode:
      name: "device mode"
