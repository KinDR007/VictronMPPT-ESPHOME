substitutions:
  name: esp32c6-compatibility-test
  external_components_source: components

esphome:
  name: ${name}

esp32:
  board: esp32-c6-devkitc-1
  variant: esp32c6
  framework:
    type: esp-idf

external_components:
  - source: ${external_components_source}

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2

ota:
  platform: esphome

logger:

api:

uart:
  id: uart_bus
  tx_pin: GPIO16
  rx_pin: GPIO17
  baud_rate: 19200

victron:
  id: victron_id
  uart_id: uart_bus

binary_sensor:
  - platform: victron
    victron_id: victron_id
    load_state:
      name: "Load state"
    relay_state:
      name: "Relay state"

sensor:
  - platform: victron
    victron_id: victron_id
    max_power_yesterday:
      name: "Max power yesterday"
    max_power_today:
      name: "Max power today"
    yield_total:
      name: "Yield total"
    yield_yesterday:
      name: "Yield yesterday"
    yield_today:
      name: "Yield today"
    panel_voltage:
      name: "Panel voltage"
    panel_power:
      name: "Panel power"
    battery_voltage:
      name: "Battery voltage"
    battery_voltage_2:
      name: "Battery voltage 2"
    battery_voltage_3:
      name: "Battery voltage 3"
    auxiliary_battery_voltage:
      name: "Auxiliary battery voltage"
    midpoint_voltage_of_the_battery_bank:
      name: "Midpoint voltage of the battery bank"
    midpoint_deviation_of_the_battery_bank:
      name: "Midpoint deviation of the battery bank"
    battery_current:
      name: "Battery current"
    battery_current_2:
